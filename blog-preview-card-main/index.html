<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

        <link rel="stylesheet" href="styles.css" />   

        <title>Frontend Mentor | Blog preview card</title>

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution { font-size: 0.6875rem; text-align: center; }
            .attribution a { color: hsl(228, 45%, 44%); }
        </style>
    </head>
    <body>


    <div class="card">
        <img src="assets/images/illustration-article.svg" alt="abstract-code-image">
        <span class="tag">Learning</span>
        <span class="publication-date">Published 21 March 2023 </span>
        <div class="article-title">HTML &amp; CSS foundations</div>
        <div class="article-description">
            These languages are the backbone of every website,
            defining structure, content, and presentation.
        </div>
        <div class="author">
            <img src="assets/images/image-avatar.webp" alt="author-avatar">
            <span class="author-name">Greg Hooper</span>
        </div>
    </div>

    <footer class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
        Coded by <a href="#">Yvette</a>.
    </footer>
    </body>
</html>
